<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francisco Martín — Backend Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #060810;
  --glass:      rgba(58,100,180,0.05);
  --glass-hi:   rgba(58,100,180,0.10);
  --glass-b:    rgba(100,150,230,0.10);
  --glass-b-hi: rgba(100,150,230,0.22);
  --coral:      #3a7bd5;
  --coral-hi:   #6aa0e8;
  --coral-lo:   rgba(58,123,213,0.13);
  --coral-glow: rgba(58,123,213,0.28);
  --text-hi:    #deeaff;
  --text:       rgba(200,220,255,0.60);
  --text-lo:    rgba(160,195,240,0.32);
  --display:    'Outfit', sans-serif;
  --mono:       'Space Mono', monospace;
  --r-sm: 12px;
  --r-md: 18px;
  --r-lg: 24px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--display);
  font-size: 15px;
  line-height: 1.7;
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
}

.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
  animation: drift 18s ease-in-out infinite alternate;
}
.orb-1 {
  width: 520px; height: 520px;
  background: radial-gradient(circle, rgba(30,70,160,0.22) 0%, transparent 70%);
  top: -180px; right: -120px;
  animation-duration: 20s;
}
.orb-2 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(20,50,120,0.14) 0%, transparent 70%);
  bottom: 10%; left: -100px;
  animation-duration: 25s; animation-delay: -8s;
}
.orb-3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(50,90,180,0.09) 0%, transparent 70%);
  top: 50%; left: 40%;
  animation-duration: 30s; animation-delay: -14s;
}
@keyframes drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(40px, 30px) scale(1.08); }
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(80,130,220,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(80,130,220,0.018) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 1;
}

.page { position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; }

/* NAV */
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 48px;
  position: sticky; top: 0; z-index: 100;
  background: rgba(6,8,16,0.65);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.nav-logo {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--coral);
  letter-spacing: 0.04em;
  text-decoration: none;
}
.lang-switch {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.lang-switch a {
  text-decoration: none;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--text-lo);
  padding: 5px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  transition: background .2s, border-color .2s, color .2s;
}
.lang-switch a:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.14);
  color: var(--text-hi);
}
.lang-switch a[aria-current="page"] {
  background: var(--coral-lo);
  border-color: rgba(58,123,213,0.30);
  color: var(--coral-hi);
}

/* MAIN CONTENT */
.shell {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 48px 80px;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* HERO CARD */
.hero-card {
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 64px;
  align-items: center;
  padding: 64px 0 48px;
  opacity: 0;
  animation: fadeUp .9s .1s forwards;
}

/* LEFT: name + wip */
.hero-left {
  display: flex;
  flex-direction: column;
  gap: 32px;
}

.hero-heading {
  font-family: var(--display);
  font-size: clamp(44px, 7vw, 84px);
  font-weight: 900;
  line-height: .95;
  letter-spacing: -0.04em;
  color: var(--text-hi);
}
.hero-heading .outline {
  color: transparent;
  -webkit-text-stroke: 1.5px rgba(58,123,213,0.75);
}
.hero-heading .coral { color: var(--coral); }

/* WIP banner */
.wip-block {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.wip-badge {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--coral-lo);
  border: 1px solid rgba(58,123,213,0.30);
  color: var(--coral-hi);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  padding: 7px 18px;
  border-radius: 40px;
  width: fit-content;
}
.wip-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--coral);
  animation: pulse-dot 2s ease-in-out infinite;
}

.wip-crane {
  font-size: 56px;
  line-height: 1;
  animation: swing 3s ease-in-out infinite;
  transform-origin: top center;
  display: inline-block;
}
@keyframes swing {
  0%,100% { transform: rotate(-4deg); }
  50%      { transform: rotate(4deg); }
}

.wip-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.7;
}
.wip-text strong { color: var(--text-hi); font-weight: 600; }

/* RIGHT: photo + buttons */
.hero-right {
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: stretch;
}

.hero-photo-wrap {
  width: 100%;
  aspect-ratio: 3 / 4;
  border-radius: var(--r-lg);
  background:
    linear-gradient(160deg, rgba(58,123,213,0.15) 0%, rgba(6,8,16,0.6) 100%),
    linear-gradient(135deg, #0d1525 0%, #111827 100%);
  background-size: cover;
  background-position: center;
  border: 1px solid var(--glass-b-hi);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero-photo-wrap::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(58,123,213,0.25), transparent 70%);
  pointer-events: none;
}
.hero-photo-placeholder {
  font-size: 72px;
  opacity: 0.15;
  user-select: none;
}

.btn-cv {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  justify-content: center;
  background: var(--glass);
  border: 1px solid var(--glass-b-hi);
  color: var(--text-hi);
  font-family: var(--display);
  font-weight: 500;
  font-size: 13px;
  padding: 12px 20px;
  border-radius: var(--r-sm);
  text-decoration: none;
  backdrop-filter: blur(10px);
  transition: background .2s, border-color .2s, color .2s;
  letter-spacing: 0.02em;
}
.btn-cv:hover {
  background: var(--coral-lo);
  border-color: rgba(58,123,213,0.45);
  color: var(--coral-hi);
}
.btn-cv svg { flex-shrink: 0; opacity: .7; }

.hero-social {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.social-link {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--glass);
  border: 1px solid var(--glass-b);
  color: var(--text-lo);
  text-decoration: none;
  padding: 8px 14px;
  border-radius: var(--r-sm);
  font-size: 12px;
  font-family: var(--mono);
  letter-spacing: 0.04em;
  transition: background .2s, border-color .2s, color .2s;
  flex: 1;
  justify-content: center;
  min-width: 80px;
}
.social-link:hover {
  background: var(--glass-hi);
  border-color: var(--glass-b-hi);
  color: var(--text-hi);
}

/* FOOTER */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 28px 48px;
  border-top: 1px solid rgba(255,255,255,0.05);
  font-size: 12px;
  color: var(--text-lo);
  font-family: var(--mono);
  position: relative;
  z-index: 2;
}
.footer-status { display: flex; align-items: center; gap: 8px; }
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #f59e0b;
  box-shadow: 0 0 6px rgba(245,158,11,0.7);
  animation: pulse-dot 2.5s ease-in-out infinite;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes pulse-dot {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.4; transform:scale(.7); }
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(58,123,213,.28); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(58,123,213,.50); }

/* RESPONSIVE */
@media (max-width: 768px) {
  .nav { padding: 16px 24px; }
  .shell { padding: 0 24px 60px; }
  .hero-card {
    grid-template-columns: 1fr;
    gap: 40px;
    padding: 48px 0 40px;
  }
  .hero-right { order: -1; }
  .hero-photo-wrap { aspect-ratio: 1/1; max-width: 220px; margin: 0 auto; }
  .footer { padding: 24px; flex-direction: column; gap: 12px; text-align: center; }
}
</style>
</head>
